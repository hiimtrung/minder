[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
# Global safety net so a single stuck test cannot block CI for 6h.
# Per-test overrides (e.g. @pytest.mark.timeout(180)) may extend this.
timeout = 120
timeout_method = thread
filterwarnings =
    ignore:Core Pydantic V1 functionality isn't compatible with Python 3\.14 or greater\.:UserWarning:langchain_core\._api\.deprecation
testpaths =
    tests
pythonpath = src
markers =
    slow: long-running integration tests that spawn subprocess servers (SSE/stdio). Excluded from the fast CI path via `-m "not slow"`.
