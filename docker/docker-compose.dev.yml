services:
  minder:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: minder-dev:latest
    ports:
      - "8080:8080"
    environment:
      MINDER_SERVER__TRANSPORT: sse
      MINDER_SERVER__HOST: 0.0.0.0
      MINDER_SERVER__PORT: 8080
      MINDER_RELATIONAL_STORE__PROVIDER: mongodb
      MINDER_MONGODB__URI: mongodb://mongodb:27017
      MINDER_CACHE__PROVIDER: redis
      MINDER_REDIS__URI: redis://redis:6379/0
      MINDER_VECTOR_STORE__PROVIDER: milvus
      MINDER_VECTOR_STORE__URI: http://milvus-standalone:19530
      MINDER_WORKFLOW__ORCHESTRATION_RUNTIME: langgraph
      MINDER_EMBEDDING__MODEL_PATH: /root/.minder/models/qwen3-embedding-0.6b.Q8_0.gguf
      MINDER_LLM__MODEL_PATH: /root/.minder/models/qwen3.5-0.8b-instruct.Q4_K_M.gguf
      MINDER_LLM__OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PYTHONPATH: /app/src
    volumes:
      - ../src:/app/src
      - ../scripts:/app/scripts
      - minder-data:/data
      - ${HOME}/.minder/models:/root/.minder/models
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: echo "db.runCommand('ping').ok" | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    security_opt:
    - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  minder-data:
  mongodb-data:
  redis-data:
  etcd-data:
  minio-data:
  milvus-data:
