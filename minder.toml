[server]
name = "minder"
version = "0.1.0"
transport = "sse"
host = "0.0.0.0"
port = 8800
log_level = "info"

[dashboard]
base_path = "/dashboard"
static_dir = "src/dashboard/dist"
dev_server_url = ""
api_url = ""

[auth]
enabled = true
jwt_secret = "dev-secret-key-change-me-in-prod"
jwt_expiry_hours = 24
api_key_prefix = "mk_"
default_admin_email = "admin@example.com"

[embedding]
provider = "ollama"
model_name = "nomic-embed-text"
ollama_url = "http://localhost:11434"
ollama_model = "nomic-embed-text"
dimensions = 768
openai_api_key = ""
openai_model = "text-embedding-3-small"

[llm]
provider = "ollama"
model_name = "gemma3:4b"
ollama_url = "http://localhost:11434"
ollama_model = "gemma3:4b"
context_length = 131072
temperature = 0.1
openai_api_key = ""
openai_model = "gpt-4o-mini"

[vector_store]
provider = "milvus_lite"
db_path = "~/.minder/data/milvus.db"
uri = "http://localhost:19530"
collection_prefix = "minder_"

[relational_store]
provider = "mongodb"

[mongodb]
uri = "mongodb://localhost:27017"
database = "minder"
min_pool_size = 5
max_pool_size = 50

[redis]
uri = "redis://localhost:6379/0"
prefix = "minder:"
session_ttl = 86400
cache_ttl = 3600

[retrieval]
top_k = 10
rerank_top_n = 5
similarity_threshold = 0.7
hybrid_alpha = 0.7

[cache]
enabled = true
provider = "redis"
ttl_seconds = 3600

[verification]
enabled = true
sandbox = "docker"
timeout_seconds = 30
docker_image = "minder-sandbox:latest"

[workflow]
enforcement = "strict"
default_workflow = "tdd"
repo_state_dir = ".minder"
block_step_skips = true

[seeding]
skills_repo = ""
skills_branch = "main"
skills_path = "skills/"
