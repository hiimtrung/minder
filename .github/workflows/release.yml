name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is on main branch
        run: |
          if ! git branch -r --contains ${{ github.sha }} | grep -E '(^|\s)origin/main($|\s)'; then
            echo "Error: Tag must be created from the main branch."
            exit 1
          fi

  build-dist:
    needs: check-branch
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --frozen --extra server

      - name: Build Python distributions
        run: uv build

      - name: Validate Python distributions
        run: uv run twine check dist/*

      - name: Compute release metadata
        id: release_meta
        run: echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload Python distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  release-pypi:
    needs: build-dist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Python distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish Python distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  # Native ARM64 + AMD64 builds in parallel — needed because llama-cpp-python
  # compiles Rust/C++ and is prohibitively slow under QEMU emulation.
  build-api:
    needs: build-dist
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set platform pair env
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=minder-api-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=minder-api-${{ env.PLATFORM_PAIR }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/minder-api,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-api-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Dashboard is pure Bun/Node — no Rust compilation, QEMU overhead is negligible.
  # Single job building both platforms is simpler and fast enough.
  build-dashboard:
    needs: build-dist
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dashboard
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=minder-dashboard
          cache-to: type=gha,mode=max,scope=minder-dashboard
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/minder-dashboard:${{ needs.build-dist.outputs.release_tag }}

  release-github:
    needs: [build-dist, release-pypi, build-api, build-dashboard]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download API digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/api
          pattern: digest-api-*
          merge-multiple: true

      - name: Create and push API manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/minder-api:${{ needs.build-dist.outputs.release_tag }} \
            $(printf 'ghcr.io/${{ github.repository_owner }}/minder-api@sha256:%s ' $(ls /tmp/digests/api))

      - name: Download Python distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Prepare release assets
        run: |
          mkdir -p dist/release
          cp docker/docker-compose.yml dist/release/docker-compose.yml
          cp docker/Caddyfile dist/release/Caddyfile
          sed \
            -e 's|__REPO_OWNER__|${{ github.repository_owner }}|g' \
            -e 's|__REPO_NAME__|${{ github.event.repository.name }}|g' \
            -e 's|__RELEASE_TAG__|${{ needs.build-dist.outputs.release_tag }}|g' \
            scripts/release/install-minder-release.sh > dist/release/install-minder-${{ needs.build-dist.outputs.release_tag }}.sh
          chmod +x dist/release/install-minder-${{ needs.build-dist.outputs.release_tag }}.sh
          sed \
            -e 's|__REPO_OWNER__|${{ github.repository_owner }}|g' \
            -e 's|__REPO_NAME__|${{ github.event.repository.name }}|g' \
            -e 's|__RELEASE_TAG__|${{ needs.build-dist.outputs.release_tag }}|g' \
            scripts/release/install-minder-release.ps1 > dist/release/install-minder-${{ needs.build-dist.outputs.release_tag }}.ps1

          cat > dist/release/release-notes.md <<'EOF'
          ## Quick Start

          1. Install or upgrade the CLI from PyPI:

            ```bash
            uv tool install --upgrade minder-cli
            # or: pipx install minder-cli
            ```

          2. Bootstrap this repository for local IDE usage:

            ```bash
            minder login --client-key mkc_your_client_key --server-url http://localhost:8800/sse
            minder install-ide --target vscode --target claude-code
            ```

          3. One-command install from this release:

            Linux/macOS:

            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ needs.build-dist.outputs.release_tag }}/install-minder-${{ needs.build-dist.outputs.release_tag }}.sh | bash
            ```

            Windows PowerShell (Docker Desktop required):

            ```powershell
            iwr -useb https://github.com/${{ github.repository }}/releases/download/${{ needs.build-dist.outputs.release_tag }}/install-minder-${{ needs.build-dist.outputs.release_tag }}.ps1 | iex
            ```

          What the installer does automatically:

          - Downloads LiteRT-LM model (`gemma-4-E2B-it.litertlm`)
          - Sets up FastEmbed for local vector embeddings
          - Creates `~/.minder/releases/${{ needs.build-dist.outputs.release_tag }}`
          - Downloads `docker-compose.yml` and `Caddyfile` from this GitHub Release
          - Starts Minder, dashboard, MongoDB, Redis, and Milvus with Docker Compose

          Requirements:

          - Docker with Compose plugin
          - `curl`

          Uninstall:

          Linux/macOS:
          ```bash
          # Keep models and data volumes:
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/release/uninstall-minder.sh | bash -s -- --keep-data

          # Full removal:
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/release/uninstall-minder.sh | bash
          ```

          Windows PowerShell:
          ```powershell
          # Keep models and data volumes:
          & ([scriptblock]::Create((irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/release/uninstall-minder.ps1))) -KeepData

          # Full removal:
          irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/release/uninstall-minder.ps1 | iex
          ```

          Update:

          Linux/macOS:
          ```bash
          # Auto-detect latest:
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/release/update-minder.sh | bash

          # Specific version:
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/release/update-minder.sh | bash -s -- --tag v0.3.0
          ```

          Windows PowerShell:
          ```powershell
          # Auto-detect latest:
          irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/release/update-minder.ps1 | iex

          # Specific version:
          & ([scriptblock]::Create((irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/release/update-minder.ps1))) -Tag v0.3.0
          ```
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release/release-notes.md
          append_body: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/release/docker-compose.yml
            dist/release/Caddyfile
            dist/release/install-minder-${{ needs.build-dist.outputs.release_tag }}.sh
            dist/release/install-minder-${{ needs.build-dist.outputs.release_tag }}.ps1
          generate_release_notes: true
