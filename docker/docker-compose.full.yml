name: minder-full
services:
  gateway:
    container_name: minder-gateway
    image: caddy:2.11.2-alpine
    restart: unless-stopped
    ports:
      - "${MINDER_PORT:-8800}:8800"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - dashboard
      - minder-api

  minder-api:
    container_name: minder-server
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: minder-api:full
    restart: unless-stopped
    volumes:
      - ${MINDER_MODELS_DIR:-~/.minder/models}:/models:ro
    environment:
      MINDER_SERVER__TRANSPORT: sse
      MINDER_SERVER__HOST: 0.0.0.0
      MINDER_SERVER__PORT: 8801
      MINDER_DASHBOARD__BASE_PATH: /dashboard
      MINDER_RELATIONAL_STORE__PROVIDER: mongodb
      MINDER_MONGODB__URI: mongodb://mongodb:27017
      MINDER_CACHE__PROVIDER: redis
      MINDER_REDIS__URI: redis://redis:6379/0
      MINDER_VECTOR_STORE__PROVIDER: milvus
      MINDER_VECTOR_STORE__URI: http://milvus-standalone:19530
      MINDER_WORKFLOW__ORCHESTRATION_RUNTIME: langgraph
      MINDER_LLM__PROVIDER: litert
      MINDER_LLM__LITERT_MODEL_PATH: /models/gemma-4-E2B-it.litertlm
      MINDER_LLM__LITERT_BACKEND: cpu
      MINDER_LLM__LITERT_CACHE_DIR: /tmp/litert-cache
      MINDER_LLM__CONTEXT_LENGTH: 16384
      MINDER_EMBEDDING__PROVIDER: fastembed
      MINDER_EMBEDDING__FASTEMBED_MODEL: mixedbread-ai/mxbai-embed-large-v1
      MINDER_EMBEDDING__FASTEMBED_CACHE_DIR: /models/fastembed
      MINDER_MONGODB__MAX_POOL_SIZE: 10
      MINDER_MONGODB__MIN_POOL_SIZE: 2
      MINDER_LLM__OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy

  dashboard:
    container_name: minder-dashboard
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    image: minder-dashboard:full
    restart: unless-stopped
    depends_on:
      - minder-api

  mongodb:
    container_name: minder-mongodb
    image: mongo:8.2.6
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: echo "db.runCommand('ping').ok" | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: minder-redis
    image: redis:8.6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    container_name: minder-etcd
    image: quay.io/coreos/etcd:v3.6.10
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: minder-minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    container_name: minder-milvus
    image: milvusdb/milvus:v2.6.14
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  mongodb-data:
  redis-data:
  etcd-data:
  minio-data:
  milvus-data:
