name: minder
services:
  gateway:
    container_name: minder-gateway
    image: caddy:2.11.2-alpine
    restart: unless-stopped
    ports:
      - "${MINDER_PORT:-8800}:8800"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - dashboard
      - minder-api

  minder-api:
    container_name: minder-server
    image: ${MINDER_API_IMAGE:-ghcr.io/hiimtrung/minder-api:latest}
    restart: unless-stopped
    volumes:
      - ${MINDER_MODELS_DIR:-~/.minder/models}:/models
    environment:
      MINDER_SERVER__TRANSPORT: sse
      MINDER_SERVER__HOST: 0.0.0.0
      MINDER_SERVER__PORT: 8801
      MINDER_DASHBOARD__BASE_PATH: /dashboard
      MINDER_RELATIONAL_STORE__PROVIDER: qdrant
      MINDER_VECTOR_STORE__PROVIDER: qdrant
      MINDER_QDRANT__URL: http://qdrant:6333
      MINDER_WORKFLOW__ORCHESTRATION_RUNTIME: langgraph
      HUGGINGFACE_HUB_CACHE: /models
      MINDER_LLM__PROVIDER: llama_cpp
      MINDER_LLM__LLAMA_CPP_MODEL_REPO: ggml-org/gemma-4-E2B-it-GGUF
      MINDER_LLM__LLAMA_CPP_MODEL_FILE: "gemma-4-E2B-it-Q8_0.gguf"
      MINDER_EMBEDDING__PROVIDER: llama_cpp
      MINDER_EMBEDDING__LLAMA_CPP_MODEL_REPO: ${MINDER_EMBEDDING_MODEL:-ggml-org/embeddinggemma-300M-GGUF}
      MINDER_EMBEDDING__LLAMA_CPP_MODEL_FILE: "embeddinggemma-300M-Q8_0.gguf"
      MINDER_EMBEDDING__DIMENSIONS: ${MINDER_EMBEDDING_DIMENSIONS:-768}
      MINDER_LLM__OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      qdrant:
        condition: service_healthy

  dashboard:
    container_name: minder-dashboard
    image: ${MINDER_DASHBOARD_IMAGE:-ghcr.io/hiimtrung/minder-dashboard:latest}
    restart: unless-stopped
    depends_on:
      - minder-api

  qdrant:
    container_name: minder-qdrant
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  qdrant-data:
